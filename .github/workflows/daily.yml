name: Daily Digest (site + email)

on:
  workflow_dispatch:
  schedule:
    # UK time 10:00. Note: during British Summer Time (BST), this will run at 11:00 local.
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install deps
        run: bun install

      - name: Generate digest (Markdown for website)
        run: |
          mkdir -p docs
          # Generate Chinese digest, last 48 hours, top 15
          npx -y bun scripts/digest.ts --hours 48 --top-n 15 --lang zh --output ./docs/index.md

          # Add simple front matter so GitHub Pages renders nicely
          if ! head -n 1 docs/index.md | grep -q '^---$'; then
            tmpfile=$(mktemp)
            cat > "$tmpfile" << 'EOF'
---
layout: default
title: AI Daily Digest
---
EOF
            cat docs/index.md >> "$tmpfile"
            mv "$tmpfile" docs/index.md
          fi

      - name: Commit updated site content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.md
          git commit -m "chore: update daily digest" || echo "No changes to commit"
          git push

      - name: Send email (Gmail SMTP)
        run: |
          cat > send_email.mjs << 'EOF'
          import fs from "fs";
          import nodemailer from "nodemailer";

          const to = process.env.MAIL_TO;
          if (!to) throw new Error("MAIL_TO is missing");

          const md = fs.readFileSync("./docs/index.md", "utf8");

          // Keep email short: include first ~2000 chars + link to site
          const siteUrl = process.env.GITHUB_PAGES_URL || "";
          const preview = md
            .replace(/^---[\s\S]*?---\n?/m, "")  // strip front matter
            .trim()
            .slice(0, 2000);

          const subject = `AI Daily Digest - ${new Date().toISOString().slice(0,10)}`;

          const transporter = nodemailer.createTransport({
            host: "smtp.gmail.com",
            port: 465,
            secure: true,
            auth: {
              user: process.env.GMAIL_USER,
              pass: process.env.GMAIL_APP_PASSWORD
            }
          });

          const html = `
            <div style="font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Arial, sans-serif; line-height: 1.5;">
              <h2>${subject}</h2>
              <p><b>Website:</b> <a href="${siteUrl}">${siteUrl}</a></p>
              <pre style="white-space: pre-wrap; background:#f6f8fa; padding:12px; border-radius:8px;">${preview}</pre>
              <p style="color:#666;">(Email shows a preview. Open the website for the full digest.)</p>
            </div>
          `;

          await transporter.sendMail({
            from: process.env.GMAIL_USER,
            to,
            subject,
            html
          });

          console.log("Email sent to:", to);
          EOF

          # nodemailer dependency (install quickly for the workflow)
          bun add nodemailer

          # Build Pages URL automatically (works after you enable Pages)
          echo "GITHUB_PAGES_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_ENV

          node send_email.mjs
