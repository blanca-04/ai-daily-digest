name: Daily Digest (site + email)

on:
  workflow_dispatch:
  schedule:
    # UK time 10:00 in winter (GMT). In summer (BST), this runs at 11:00 local.
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Generate digest (Markdown for website)
        run: |
          mkdir -p docs
          npx -y bun scripts/digest.ts --hours 48 --top-n 15 --lang zh --output ./docs/index.md

      - name: Add simple front matter (for GitHub Pages)
        run: |
          if ! head -n 1 docs/index.md | grep -q '^---$'; then
            tmpfile=$(mktemp)
            cat > "$tmpfile" << 'EOF'
---
layout: default
title: AI Daily Digest
---
EOF
            cat docs/index.md >> "$tmpfile"
            mv "$tmpfile" docs/index.md
          fi

      - name: Commit updated site content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.md
          git commit -m "chore: update daily digest" || echo "No changes to commit"
          git push

      - name: Send email (Gmail SMTP)
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: AI Daily Digest - ${{ github.run_number }}
          to: ${{ secrets.MAIL_TO }}
          from: AI Digest <${{ secrets.GMAIL_USER }}>
          html_body: |
            <p>Today's digest is updated ✅</p>
            <p><b>Website:</b> https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/</p>
            <p>Open the site to view the full digest.</p>
